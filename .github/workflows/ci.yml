name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7.0.0

      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install npm
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        run: npm ci
        env:
          # Skip electron-builder app-deps work; CI checks need no packaging.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Formatting check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and fixture tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

  native-windows:
    runs-on: windows-latest
    steps:
      - name: Check out Git repository and LFS objects
        uses: actions/checkout@v7.0.0
        with:
          lfs: true

      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22

      - name: Verify LF checkout on Windows
        shell: pwsh
        run: |
          $crlfFiles = git ls-files --eol | Select-String "w/crlf"
          if ($crlfFiles) {
            $crlfFiles | ForEach-Object { Write-Error $_ }
            throw "Tracked text files were checked out with CRLF line endings."
          }

      - name: Reject unhydrated or invalid native resources
        run: node scripts/verify-resources.mjs

      - name: Exercise native download and media pipelines
        run: node scripts/e2e/native-media.mjs

      - name: Confirm LFS checkout
        run: git lfs ls-files
