name: Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository and LFS objects
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$packageVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$packageVersion."
          }

      # Keep each gate in its own step. PowerShell can otherwise continue after
      # a native command fails and accidentally report only the final exit code.
      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Verify native resources
        run: pnpm run verify:resources

      - name: Exercise source native download and media pipelines
        run: pnpm run test:e2e:native

      - name: Build Windows installer
        run: pnpm run build:win

      - name: Exercise packaged native download and media pipelines
        run: node scripts/e2e/native-media.mjs --resources=dist/win-unpacked/resources

      - name: Verify and label unsigned artifacts
        shell: pwsh
        run: |
          $artifacts = @("dist/win-unpacked/Prism.exe", "dist/Prism-Setup-${{ github.ref_name }}.exe")
          $installer = Get-ChildItem dist -Filter "Prism-Setup-*.exe" -File | Select-Object -First 1
          if ($null -eq $installer) { throw "Windows installer is missing." }
          $artifacts[1] = $installer.FullName
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact
            if ($signature.Status -ne "NotSigned") {
              throw "Expected an unsigned artifact but $artifact reported $($signature.Status)."
            }
          }
          @(
            "Signing status: UNSIGNED",
            "Tag: ${{ github.ref_name }}",
            "Commit: ${{ github.sha }}",
            "",
            "Windows SmartScreen may warn or block this installer. Verify its SHA-256 checksum before running it."
          ) | Set-Content dist/SIGNING-STATUS.txt

      - name: Write artifact checksums
        shell: pwsh
        run: Get-ChildItem dist -Filter *.exe | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Set-Content dist/SHA256SUMS-windows.txt

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows-unsigned
          path: |
            dist/Prism-Setup-*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/SHA256SUMS-windows.txt
            dist/SIGNING-STATUS.txt
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: prism-windows-unsigned
          path: dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          prerelease: true
          name: Prism ${{ github.ref_name }} (unsigned alpha)
          body_path: RELEASE_NOTES.md
