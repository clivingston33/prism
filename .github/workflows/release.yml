name: Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    outputs:
      signing_status: ${{ steps.signing.outputs.status }}
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

    steps:
      - name: Check out repository and LFS objects
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Determine signing mode
        id: signing
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:CSC_LINK) -and -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            "status=signed" >> $env:GITHUB_OUTPUT
          } else {
            "status=unsigned" >> $env:GITHUB_OUTPUT
          }

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality and native-resource gates
        run: |
          pnpm run format:check
          pnpm run lint
          pnpm run typecheck
          pnpm test
          pnpm run verify:resources

      - name: Build Windows installer
        run: pnpm run build:win

      - name: Verify executable and installer signatures
        if: steps.signing.outputs.status == 'signed'
        run: pnpm run verify:signatures

      - name: Verify and label unsigned artifacts
        if: steps.signing.outputs.status == 'unsigned'
        shell: pwsh
        run: |
          $artifacts = @("dist/win-unpacked/Prism.exe", "dist/Prism-Setup-${{ github.ref_name }}.exe")
          $installer = Get-ChildItem dist -Filter "Prism-Setup-*.exe" -File | Select-Object -First 1
          if ($null -eq $installer) { throw "Windows installer is missing." }
          $artifacts[1] = $installer.FullName
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact
            if ($signature.Status -ne "NotSigned") {
              throw "Expected an unsigned artifact but $artifact reported $($signature.Status)."
            }
          }
          @"
          Signing status: UNSIGNED
          Tag: ${{ github.ref_name }}
          Commit: ${{ github.sha }}

          Windows SmartScreen may warn or block this installer. Verify its SHA-256 checksum before running it.
          "@ | Set-Content dist/SIGNING-STATUS.txt

      - name: Record signed artifact status
        if: steps.signing.outputs.status == 'signed'
        shell: pwsh
        run: "Signing status: SIGNED`nTag: ${{ github.ref_name }}`nCommit: ${{ github.sha }}" | Set-Content dist/SIGNING-STATUS.txt

      - name: Write artifact checksums
        shell: pwsh
        run: Get-ChildItem dist -Filter *.exe | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Set-Content dist/SHA256SUMS-windows.txt

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows-${{ steps.signing.outputs.status }}
          path: |
            dist/Prism-Setup-*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/SHA256SUMS-windows.txt
            dist/SIGNING-STATUS.txt
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: prism-windows-${{ needs.build.outputs.signing_status }}
          path: dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          prerelease: ${{ needs.build.outputs.signing_status == 'unsigned' }}
          name: Prism ${{ github.ref_name }} (${{ needs.build.outputs.signing_status }})
