name: Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository and LFS objects
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          lfs: true

      - name: Verify tag is on main
        shell: pwsh
        run: |
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tags must point to a commit on main."
          }

      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install npm
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$packageVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$packageVersion."
          }

      # Keep each gate in its own step. PowerShell can otherwise continue after
      # a native command fails and accidentally report only the final exit code.
      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Verify native resources
        run: npm run verify:resources

      - name: Exercise source native download and media pipelines
        run: npm run test:e2e:native

      - name: Build Windows installer
        run: npm run build:win

      - name: Verify packaged notices
        shell: pwsh
        run: |
          $requiredNotices = @(
            "dist/win-unpacked/resources/LICENSE",
            "dist/win-unpacked/resources/THIRD_PARTY_NOTICES.md",
            "dist/win-unpacked/resources/licenses/FFmpeg-GPL-3.0.txt",
            "dist/win-unpacked/resources/licenses/FFmpeg-Gyan-README.txt",
            "dist/win-unpacked/resources/licenses/whisper.cpp-MIT.txt"
          )
          foreach ($notice in $requiredNotices) {
            if (-not (Test-Path -LiteralPath $notice -PathType Leaf)) {
              throw "Required packaged notice is missing: $notice"
            }
          }

      - name: Exercise packaged native download and media pipelines
        run: node scripts/e2e/native-media.mjs --resources=dist/win-unpacked/resources

      - name: Verify and label unsigned artifacts
        shell: pwsh
        run: |
          $artifacts = @("dist/win-unpacked/Prism.exe", "dist/Prism-Setup-${{ github.ref_name }}.exe")
          $installer = Get-ChildItem dist -Filter "Prism-Setup-*.exe" -File | Select-Object -First 1
          if ($null -eq $installer) { throw "Windows installer is missing." }
          $artifacts[1] = $installer.FullName
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact
            if ($signature.Status -ne "NotSigned") {
              throw "Expected an unsigned artifact but $artifact reported $($signature.Status)."
            }
          }
          @(
            "Signing status: UNSIGNED",
            "Tag: ${{ github.ref_name }}",
            "Commit: ${{ github.sha }}",
            "",
            "Windows SmartScreen may warn or block this installer. Verify its SHA-256 checksum before running it."
          ) | Set-Content dist/SIGNING-STATUS.txt

      - name: Write artifact checksums
        shell: pwsh
        run: Get-ChildItem dist -Filter *.exe | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Set-Content dist/SHA256SUMS-windows.txt

      - name: Upload release candidate
        uses: actions/upload-artifact@v7.0.1
        with:
          name: prism-windows-unsigned
          path: |
            dist/Prism-Setup-*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/SHA256SUMS-windows.txt
            dist/SIGNING-STATUS.txt
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@v7.0.0

      - name: Download release artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: prism-windows-unsigned
          path: dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v3.0.2
        with:
          files: dist/*
          draft: true
          prerelease: true
          name: Prism ${{ github.ref_name }} (unsigned alpha)
          body_path: RELEASE_NOTES.md
