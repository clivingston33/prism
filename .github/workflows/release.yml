name: Signed Windows Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

    steps:
      - name: Check out repository and LFS objects
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Require release signing credentials
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            throw "Signed public releases require WINDOWS_CSC_LINK and WINDOWS_CSC_KEY_PASSWORD secrets."
          }

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality and native-resource gates
        run: |
          pnpm run format:check
          pnpm run lint
          pnpm run typecheck
          pnpm test
          pnpm run verify:resources

      - name: Build signed Windows installer
        run: pnpm run build:win

      - name: Verify executable and installer signatures
        run: pnpm run verify:signatures

      - name: Write artifact checksums
        shell: pwsh
        run: Get-ChildItem dist -Filter *.exe | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Set-Content dist/SHA256SUMS-windows.txt

      - name: Upload signed release candidate
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows-signed
          path: |
            dist/Prism-Setup-*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/SHA256SUMS-windows.txt
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: prism-windows-signed
          path: dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
