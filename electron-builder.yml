appId: com.prism.desktop
productName: Prism
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  - from: resources/prism-light.png
  - from: resources/prism-dark.png
  - from: resources/icon.ico
  - from: resources/licenses
    to: licenses
    filter:
      - "**/*"
  - from: THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: LICENSE
    to: LICENSE
asar: true
publish:
  provider: github
  owner: clivingston33
  repo: prism
  releaseType: release
win:
  target: nsis
  artifactName: Prism-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Prism stores settings, history, thumbnails, transcripts, and Whisper
  # models below app.getPath("userData"). Never remove those user files as a
  # side effect of uninstalling the application.
  deleteAppDataOnUninstall: false
